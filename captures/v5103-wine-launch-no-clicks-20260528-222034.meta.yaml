# ─── Outcome ────────────────────────────────────────────────────────

result: 'baseline_enumeration_only'           # not a "success/fail" — diagnostic

result_evidence: |
  Service Tool launched, did standard USB descriptor reads:
    - DEVICE descriptor (first 8 bytes, then full)
    - CONFIGURATION descriptor (first 9 bytes, then full 156 bytes)
    - Same sequence repeated on 2 other USB devices on the bus (1.5.0 + 1.23.0)
  Read IEEE-1284 device-id via interface 1 endpoint 0x82 (4 bulk-IN events
  at frames 38/39/53/54).

  CRITICAL: NO bulk-OUT traffic to endpoint 0x03 (interface 4, the
  vendor-specific maintenance channel). Service Tool v5103 did not send
  any maintenance commands during the launch window. This is consistent
  with v5103's model-list NOT including G6020 — Service Tool may have
  recognized the device class but not bound interface 4 because the
  attached printer didn't match a supported model.

  Net: this pcap is a NEGATIVE-control baseline. Future captures driven
  by GUI clicks (R1 cheap-spike runbook) will show ADDITIONAL bulk-OUT
  traffic on endpoint 0x03 when the user clicks the Counter Clear button.
  The diff between this baseline and the GUI-driven capture is the
  maintenance command sequence we want.


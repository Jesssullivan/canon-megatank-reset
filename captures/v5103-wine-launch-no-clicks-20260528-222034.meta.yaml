  bulk_in_endpoint_0x82_count: 4              # IEEE-1284 device-id reads
  bulk_in_endpoint_0x86_count: 2              # async URB_INTERRUPT (not data)
  bulk_in_endpoint_0x89_count: 1              # async URB_INTERRUPT (scan button?)

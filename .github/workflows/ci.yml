name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets-scan:
    name: secrets-scan (gitleaks + trufflehog)
    runs-on: ${{ fromJSON(vars.PRIMARY_LINUX_RUNNER_LABELS_JSON || '["ubuntu-latest"]') }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # Canonical tinyland scan: TruffleHog (--only-verified) + gitleaks history
      # scan, honoring this repo's .gitleaks.toml (scopes the RE cipher-hex
      # allowlist to docs/research + docs/paper). Surfaces findings_count into
      # the step summary. See ci-templates/.github/actions/secrets-scan.
      - uses: tinyland-inc/ci-templates/.github/actions/secrets-scan@v2
        with:
          gitleaks-config: .gitleaks.toml

  check:
    name: check (lint + typecheck + yaml/ansible)
    needs: [secrets-scan]
    runs-on: ${{ fromJSON(vars.PRIMARY_LINUX_RUNNER_LABELS_JSON || '["ubuntu-latest"]') }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: tinyland-inc/ci-templates/.github/actions/setup-nix@v2
      - run: nix develop --command just check

  test:
    name: test (pytest + protocol property tests)
    needs: [secrets-scan]
    runs-on: ${{ fromJSON(vars.PRIMARY_LINUX_RUNNER_LABELS_JSON || '["ubuntu-latest"]') }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: tinyland-inc/ci-templates/.github/actions/setup-nix@v2
      - run: nix develop --command just test

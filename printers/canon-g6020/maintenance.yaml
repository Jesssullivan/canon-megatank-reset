# Canon G6020 maintenance SSOT
#
# This file is the single source of truth for canon-tool reverse-engineering
# evidence + safety gates per physical unit. The protocol fingerprint must
# match the runtime printer fingerprint before any write op is permitted.
#
# Schema is enforced by services/canon-tool/src/printstack_canon/fingerprint.py.

# ─── Identity ──────────────────────────────────────────────────────────────────

model_family: canon-g6020
usb_id: '04a9:1865'                          # idVendor:idProduct (lsusb format)
ipp_make_and_model: 'Canon G6000 series'     # as reported by ipp-usb at :60001

# ─── Test unit (the broken-5B00 G6020 on mbp-13) ───────────────────────────────
#
# This is the ONLY unit that may receive an EEPROM write until the protocol
# is locked. All other G6020s in the fleet are refused by the service.

test_unit:
  uuid: '00000000-0000-1000-8000-00186501807c'  # IPP printer-uuid (NIC-MAC-derived)
  mac_suffix: '00:18:65:01:80:7c'               # trailing 12 hex of uuid, formatted
  serial_sticker: null                          # TODO: capture from physical back-panel sticker
  attached_to_host: mbp-13
  initial_state: 'stopped — marker-waste-full-error (5B00)'
  acquired: '2026-05-28'

# ─── Protocol fingerprint (locked) ─────────────────────────────────────────────
#
# Captured via `/usr/bin/ipptool -tv ipp://localhost:60001/ipp/print
# get-printer-attributes.test` on 2026-05-28 against the test unit.
# Any drift here aborts ops (services/canon-tool/src/printstack_canon/fingerprint.py).

protocol_fingerprint:
  printer_firmware_version: '1.070'
  printer_device_id: 'MFG:Canon;CMD:BJRaster3,NCCe,IVEC,URF;SOJ:CHMP,CHMPu;MDL:G6000 series;CLS:PRINTER;DES:Canon G6000 series;VER:1.070;STA:10;PSE:KMDA10021;CID:CA_IVEC1TYPE4_IJP;URF:V1.4,CP1,PQ4-5,RS600,SRGB24,W8,OB9,OFU0,DM3,IS1-18;'
  cmd_set:                                    # parsed from CMD: field of device-id
    - BJRaster3                               # legacy Canon print raster
    - NCCe                                    # Network Canon Configuration ext (likely maintenance carrier)
    - IVEC                                    # Canon IVEC (newer; PSE:KMDA10021, CID:CA_IVEC1TYPE4_IJP)
    - URF                                     # Apple Unified Raster (AirPrint)

last_verified_firmware: '1.070'               # ops are blocked if runtime fw drifts from this
last_verified_at: '2026-05-28T22:15:46Z'      # ping suite captured via safe-ping-probe.py

# ─── USB interface layout (captured via pyusb safe-ping-probe on 2026-05-28) ──
# The G6020 exposes 6 interfaces. CRITICAL: maintenance commands almost
# certainly travel over interface 4 (vendor-specific class 0xff sub 0x01
# proto 0x01), NOT the USB-IF printer-class interface 1 that CUPS uses.
#
# See services/canon-tool/captures/ping-baseline-2026-05-28.yaml for the
# full descriptor + IEEE-1284 device-id evidence.

usb_interface_layout:
  total_interfaces: 6
  printer_class_interface: 1                  # USB-IF Printer Class — CUPS/ipp-usb bind here
  ipp_usb_interfaces: [2, 3]                  # alt 1 = IPP-over-USB protocol
  vendor_maintenance_interfaces: [0, 4, 5]    # class 0xff — Service Tool target lives here

  # The expected maintenance channel — confirm with R1/R2 captures.
  expected_maintenance:
    interface_number: 4
    class: '0xff'
    sub_class: '0x01'
    protocol: '0x01'
    bulk_out_endpoint: '0x03'                 # commands go OUT here
    bulk_in_endpoint: '0x86'                  # responses come back here
    max_packet_size: 512

  # tshark filter for isolating maintenance traffic on a capture:
  capture_filter_for_maintenance: |
    tshark -r capture.pcapng \
      -Y "usb.transfer_type == 0x03 and (usb.endpoint_address == 0x03 or usb.endpoint_address == 0x86)"

# ─── Supported operations ─────────────────────────────────────────────────────
#
# Empty until evidence lands. Each op gets:
#   - `name`              — operator-facing
#   - `risk`              — read-only | write-eeprom | mechanical
#   - `requires`          — list of pre-flight ops (ping suite by default)
#   - `byte_sequence`     — null until R1/R2/R3 captures something usable
#   - `captured_at`       — ISO8601 + source (wine|qemu|ghidra)
#   - `last_validated_at` — when this op was last successfully replayed against the named test unit

supported: []

# ─── Safety budget ────────────────────────────────────────────────────────────

write_budget:
  cap: 50                                     # max EEPROM writes against test_unit before manual review
  consumed: 0                                 # incremented by services/canon-tool/src/printstack_canon/lockfile.py
  refill_policy: manual                       # must be manually edited + audited; no auto-reset

# ─── Rollback evidence ────────────────────────────────────────────────────────

eeprom_baseline_dump: null                    # path to pre-flight EEPROM dump (relative to /var/lib/canon-tool/)
eeprom_baseline_sha256: null                  # sha256 of baseline dump
eeprom_baseline_captured_at: null

# ─── Service Tool reference (versions known to cover G6020) ───────────────────
#
# We do not redistribute these binaries — this is documentation of what we've
# tested against. Acquired via shpgn/service_tool_canon (older) + other sources
# (newer). All SHAs MUST be pinned before a binary is used for capture.


# ─── Command protocol (recovered via R3 Ghidra static analysis, TIN-1697) ────
# Source: ServiceTool_v5103.exe static trace. See
# docs/research/canon-tool-ghidra-notes.md for the full derivation.
# Status of the absorber-reset opcode is `pending-capture`: the wire bytes are
# obfuscated by the Service Tool's EncCommService layer, so the exact sequence
# is recovered by R1/R2 dynamic capture (TIN-1694) + validated against the
# firmware dispatch table (TIN-1699), NOT hand-built from this static trace.

command_protocol:
  transport:
    windows: 'usbscan.sys via DeviceIoControl on \\.\UsbscanN (CreateFileW + SetupDi*)'
    linux: 'pyusb bulk transfer on interface 4 (bulk OUT 0x03 / bulk IN 0x86)'
    ioctl_send: 0x220038          # host -> printer (header + payload); out-buffer NULL
    ioctl_receive: 0x22003c       # printer -> host (read response; 5000B out-buffer)
    ioctl_read_variants: [0x220030, 0x220034]   # additional usbscan pipe IOCTLs seen in WICReset
    # CORROBORATION (2026-05-30): WICReset (printerpotty.exe), reverse-engineered
    # independently, uses the IDENTICAL usbscan IOCTL family over a CreateFileW
    # handle (C++ USBPipe::do_open; handle cached at USBPipe+0x24):
    #   FUN_0052ce40 -> 0x220038 SEND   FUN_0052cab0 -> 0x22003c RECV
    #   FUN_0052d110 -> 0x220034        FUN_0052d4f0 -> 0x220030
    # Two independent REs (Canon Service Tool + WICReset) agree on the transport.
    # See docs/research/wicreset-static-re.md "T2 BREAKTHROUGH".
    corroboration: 'two-tool (Service Tool + WICReset static RE)'
  wire_frame:
    layout: '[cmd:u8][arg_hi:u8][arg_lo:u8][payload...]'   # 3-byte big-endian header
    generic_cmds:
      send: 0x85       # CONFIRMED — v5103 FUN_0040fa60: FUN_0042b030(h,0x85,0,SEND,...)
      receive: 0x86    # CONFIRMED — v5103 FUN_0040f500 read poll: (h,0x86,0,RECV,buf,0x14,..)
    status_read_len: 0x14   # 20-byte status frame the RECV poll reads
    note: 'Operation identity is carried in the data block, not the cmd byte. cmd 0x85/0x86 confirmed from two v5103 functions. See docs/research/servicetool-v5103-read-re.md.'
  enccommservice:
    class: 'EncCommService'
    payload_transform: passthrough   # CORRECTED (was "obfuscation"): the IOCTL
    notes: |
      EncCommService is the TRANSPORT class, NOT a payload obfuscator. The IOCTL
      primitive FUN_004302c0 copies the payload to the wire VERBATIM (see
      servicetool-v5103-static-re.md), so no per-command transform stands between
      the [cmd][arg][payload] frame and usbscan. The TOOL_0006 license/anti-tamper
      checks gate WHETHER a command runs (FUN_0040fb40), not WHAT bytes it sends.
      The transport object DAT_00494ee0 is an EncCommService instance
      (FUN_0046c330 -> ctor FUN_0042aa20). Replay = the derived frame verbatim.
  dispatch_map:                   # button group selector -> operation (from FUN_0040ac60)
    group_7: 'Ink Absorber Counter (Set)'   # the 5B00 reset path
    group_0x37: 'other counter (id=1152 handler)'

# Canon G6020 maintenance SSOT
#
# This file is the single source of truth for canon-tool reverse-engineering
# evidence + safety gates per physical unit. The protocol fingerprint must
# match the runtime printer fingerprint before any write op is permitted.
#
# Schema is enforced by src/canon_megatank/fingerprint.py.

# ─── Identity ──────────────────────────────────────────────────────────────────

model_family: canon-g6020
usb_id: '04a9:1865'                          # idVendor:idProduct (lsusb format)
ipp_make_and_model: 'Canon G6000 series'     # as reported by ipp-usb at :60001

# ─── Test unit (the broken-5B00 G6020 on mbp-13) ───────────────────────────────
#
# This is the ONLY unit that may receive an EEPROM write until the protocol
# is locked. All other G6020s in the fleet are refused by the service.

test_unit:
  uuid: '00000000-0000-1000-8000-00186501807c'  # IPP printer-uuid (NIC-MAC-derived)
  mac_suffix: '00:18:65:01:80:7c'               # trailing 12 hex of uuid, formatted
  serial_sticker: null                          # TODO: capture from physical back-panel sticker
  attached_to_host: mbp-13
  initial_state: 'stopped — marker-waste-full-error (5B00)'
  acquired: '2026-05-28'

# ─── Protocol fingerprint (locked) ─────────────────────────────────────────────
#
# Captured via `/usr/bin/ipptool -tv ipp://localhost:60001/ipp/print
# get-printer-attributes.test` on 2026-05-28 against the test unit.
# Any drift here aborts ops (src/canon_megatank/fingerprint.py).

protocol_fingerprint:
  printer_firmware_version: '1.070'
  printer_device_id: 'MFG:Canon;CMD:BJRaster3,NCCe,IVEC,URF;SOJ:CHMP,CHMPu;MDL:G6000 series;CLS:PRINTER;DES:Canon G6000 series;VER:1.070;STA:10;PSE:KMDA10021;CID:CA_IVEC1TYPE4_IJP;URF:V1.4,CP1,PQ4-5,RS600,SRGB24,W8,OB9,OFU0,DM3,IS1-18;'
  cmd_set:                                    # parsed from CMD: field of device-id
    - BJRaster3                               # legacy Canon print raster
    - NCCe                                    # Network Canon Configuration ext (likely maintenance carrier)
    - IVEC                                    # Canon IVEC (newer; PSE:KMDA10021, CID:CA_IVEC1TYPE4_IJP)
    - URF                                     # Apple Unified Raster (AirPrint)

last_verified_firmware: '1.070'               # ops are blocked if runtime fw drifts from this
last_verified_at: '2026-05-28T22:15:46Z'      # ping suite captured via safe-ping-probe.py

# ─── USB interface layout (captured via pyusb safe-ping-probe on 2026-05-28) ──
# The G6020 exposes 6 interfaces. CRITICAL: maintenance commands almost
# certainly travel over interface 4 (vendor-specific class 0xff sub 0x01
# proto 0x01), NOT the USB-IF printer-class interface 1 that CUPS uses.
#
# See captures/ping-baseline-2026-05-28.yaml for the
# full descriptor + IEEE-1284 device-id evidence.

usb_interface_layout:
  total_interfaces: 6
  printer_class_interface: 1                  # USB-IF Printer Class — CUPS/ipp-usb bind here
  ipp_usb_interfaces: [2, 3]                  # alt 1 = IPP-over-USB protocol
  vendor_maintenance_interfaces: [0, 4, 5]    # class 0xff — Service Tool target lives here

  # The expected maintenance channel — confirm with R1/R2 captures.
  expected_maintenance:
    interface_number: 4
    class: '0xff'
    sub_class: '0x01'
    protocol: '0x01'
    bulk_out_endpoint: '0x03'                 # commands go OUT here
    bulk_in_endpoint: '0x86'                  # responses come back here
    max_packet_size: 512

  # tshark filter for isolating maintenance traffic on a capture:
  capture_filter_for_maintenance: |
    tshark -r capture.pcapng \
      -Y "usb.transfer_type == 0x03 and (usb.endpoint_address == 0x03 or usb.endpoint_address == 0x86)"

# ─── Supported operations ─────────────────────────────────────────────────────
#
# Empty until evidence lands. Each op gets:
#   - `name`              — operator-facing
#   - `risk`              — read-only | write-eeprom | mechanical
#   - `requires`          — list of pre-flight ops (ping suite by default)
#   - `byte_sequence`     — null until R1/R2/R3 captures something usable
#   - `captured_at`       — ISO8601 + source (wine|qemu|ghidra)
#   - `last_validated_at` — when this op was last successfully replayed against the named test unit

supported:
  # The absorber-reset path. Static RE of Service Tool v5103 (see
  # docs/research/servicetool-v5103-static-re.md) recovered the full payload:
  # the "EncCommService obfuscation" was a misread — the IOCTL primitive
  # FUN_004302c0 memcpy's the payload to the wire VERBATIM (passthrough), so the
  # exact bytes are statically derived, no capture/key needed. Status remains
  # `derived-unvalidated` (not `verified`) until: (a) Lane C firmware
  # dispatch-table cross-check, and (b) the physical reset on the real unit
  # (after waste-ink pads). The payload below is the G-series FAMILY encoding;
  # v5103 has no G6020 string, so G6020-applicability is the family hypothesis.
  absorber_reset:
    name: 'Ink Absorber Counter — Set/reset'
    risk: write-eeprom
    # STATUS NOTE (2026-06-01): the native libusb clear (the WICReset-derived
    # enciphered session driven over the usbprint VENDOR control transport — see
    # derived_sequence.validation: hardware-validated below) DID clear 5B00 on the
    # real debug unit: the printer rebooted to normal mode 04a9:1865 after a clean
    # power-button shutdown. The cipher + 23-byte framing reproduce WICReset's
    # captured frames byte-exact (hardware_validated_frames). We deliberately KEEP
    # status `derived-unvalidated`: per repo convention the verified-captured
    # promotion is a manual, per-physical-unit decision gated on a pads-installed
    # validation run with a fresh EEPROM baseline, not an automatic flip from one
    # debug-unit success. ops.reset_absorber_wicreset / `canon-megatank
    # reset-native --execute` therefore still require the explicit accept_derived /
    # --accept-derived one-run override on this DERIVED-UNVALIDATED SSOT; the
    # operator promotes status by hand after a clean, pads-installed run.
    status: derived-unvalidated              # native clear hardware-validated; manual promotion still required
    operation_group: 7                       # FUN_0040ac60 group selector
    pre_transform_payload: '[00, 03, flags, 03, idx]'  # flags 0x01|0x81 (checkbox); idx = absorber selector
    # Recovered literals (Service Tool v5103, label-confirmed):
    payload_transform: passthrough           # FUN_004302c0: payload copied to wire unchanged
    absorber_idx:                            # DAT_0048295c label map (sel -> idx -> name)
      main: 0x07                             # "Main" — the 5B00 main ink absorber (reset target)
      main_black: 0x01
      main_color: 0x03
      platen: 0x00
      main_and_platen: 0x06
    flags_default: 0x01                      # 0x81 if the dialog checkbox is set
    derived_payload_main: '[00, 03, 01, 03, 07]'  # main-absorber reset (flags=0x01, idx=0x07)
    session_preamble: '[12, 34, 00, 00, 01, 00]'  # 6-byte mode block via vtable[0x44], sent on mode change
    header_cmd: 0x85                         # generic SEND; arg=0x0000 (identity rides in payload, not cmd)
    byte_sequence: null                      # full on-wire frame; confirmed at physical-validation time
    captured_at: null
    last_validated_at: null
    # ── Transport (Lane C) ─────────────────────────────────────────────────────
    # Two transports observed for the SAME [00 03 01 03 07] payload:
    #   transport: bulk     — the v5103-derived path (encode_send → BULK_OUT 0x03
    #                         on interface 4). ACK'd but firmware-GATED: 5B00
    #                         persists. This is what ops.reset_absorber drives.
    #   transport: control  — the REAL WICReset service-mode path: an EP0 VENDOR
    #                         control-OUT to the device in service mode (idProduct
    #                         0x12fe). This is what ops.replay_control_sequence
    #                         drives. The captured frame (Lane C ctrl-reset pcap):
    #                           bmRequestType=0x40 bRequest=0x85 wValue=0 wIndex=0
    #                           data=[00 03 01 03 07]
    #                         framed by class control-IN reads (0xA1/0x00 1284-id,
    #                         0xA1/0x01 status). Whether this clears 5B00 offline
    #                         (locally replayable) or needs a cloud nonce is the
    #                         open question the offline-replay test answers — see
    #                         docs/runbook/wicreset-capture-analysis-pipeline.md.
    transport: control
    service_mode_product_id: 0x12fe          # G6020 enumerates here once in service mode (vs 0x1865 normal)
    # PLACEHOLDER until a real WICReset capture is extracted with
    # scripts/parse-wicreset-capture.py --replay-snippet and pinned here. Each
    # entry: bmRequestType/bRequest/wValue/wIndex + data (hex, OUT) or read_length
    # (IN). ops.replay_control_sequence REFUSES to drive this while status is
    # `derived-unvalidated` AND refuses if this list is empty. Populate ONLY from a
    # verified offline-clearing capture, then promote status to `verified-captured`.
    control_sequence: []
    # Example (from the ctrl-reset rehearsal capture — NOT yet offline-verified):
    #   - { bmRequestType: 0xa1, bRequest: 0x00, wValue: 0x0000, wIndex: 0x0000, read_length: 1024 }  # 1284-id
    #   - { bmRequestType: 0xa1, bRequest: 0x01, wValue: 0x0000, wIndex: 0x0000, read_length: 1 }     # status
    #   - { bmRequestType: 0x40, bRequest: 0x85, wValue: 0x0000, wIndex: 0x0000, data: '0003010307' } # RESET
    #   - { bmRequestType: 0xa1, bRequest: 0x01, wValue: 0x0000, wIndex: 0x0000, read_length: 1 }     # status
    control_sequence_captured_at: null
    control_sequence_offline_verified: false  # set true ONLY after the offline-replay test clears 5B00

    # ── DERIVED template (WICReset APP.BIN cleartext) ──────────────────────────
    # Recovered 2026-06-01 from the decrypted WICReset model DB devices.xml
    # (sha256 6031555f143080038431cf963706191a3108bd7c4fec03eeffeb2c8f60d86db3),
    # produced offline by scripts/appbin_decrypt.py (3DES-EDE3-CBC zero-key → ZIP
    # → devices.srs → ZIP → devices.xml). This is the literal G6000-family reset
    # template the static-RE lane (docs/research/wicreset-g6020-reset-template.md)
    # left as "runtime-only"; full join + sequence in
    # docs/research/wicreset-g6020-reset-derived.md.
    #
    # GATE: this block is EVIDENCE ONLY. It is `derived-not-yet-validated` and
    # does NOT promote absorber_reset.status (still `derived-unvalidated`). No op
    # reads or writes from here; ops.reset_absorber / ops.replay_control_sequence
    # remain hard-gated on status == 'verified-captured'. Populate the live
    # device keyword + validate physically before promoting.
    derived_template:
      validation: derived-not-yet-validated     # NOT a runnable op; evidence pending physical validation
      source_devices_xml_sha256: '6031555f143080038431cf963706191a3108bd7c4fec03eeffeb2c8f60d86db3'
      decrypt_script: scripts/appbin_decrypt.py
      # ── Model resolution (no G6020 literal; G6020 ∈ G6000 series) ────────────
      spec_block: CANON-IPL                      # <CANON-IPL> (CANON-SR5 is only service-mode help text)
      device_row: 'G6000 series'                 # <device>G6000 series … <method>3</method><support>query;waste:common</support>
      method: 3                                  # selects encoder <handler>0x03</handler>
      functor: 0x03                              # functor-3 (LCG envelope + XOR keystream) — resolves the static "2 vs 3?" wall
      support: 'query;waste:common'              # G6000 family clears ONLY the 'common' absorber (the 5B00 main)
      # ── Command prefixes (the session-frame headers) ─────────────────────────
      # Re-synced from the devices.xml-parsed <commands> prefixes (2026-06-01):
      # the literal '0x0000000' arg word collapses to a single wire byte, so the
      # real on-wire headers are set_session=81 00 00 03, get_keyword/get_command=
      # 82/86 00 00, set_command=85 00 00 (3-byte SEND header). The earlier
      # 5-token 85 00 00 00 00 form put frame[3]=0x00 (wrong function block) and
      # diverged from the validated native frame 85 00 00 || 10 07 7c.
      commands:
        set_session: '0x81 0x00 0x00 0x03'
        get_version: '0x8A 0x00 0x00'
        get_keyword: '0x82 0x00 0x00'            # RECV returns the live device keyword (the one residual input)
        get_command: '0x86 0x00 0x00'
        set_command: '0x85 0x00 0x00'
      # ── functions.waste rows: selector 10 07 7C then reset operand 0D <region> 00 ─
      functions_waste:
        away: { commands: ['0x10 0x07 0x7C', '0x0D 0x05 0x00'] }
        black: { commands: ['0x10 0x07 0x7C', '0x0D 0x03 0x00'] }
        common: { commands: ['0x10 0x07 0x7C', '0x0D 0x00 0x00'] }  # G6000-family reset target (5B00)
        platen: { commands: ['0x10 0x07 0x7C', '0x0D 0x01 0x00'] }
        color: { commands: ['0x10 0x07 0x7C', '0x0D 0x04 0x00'] }
        home: { commands: ['0x10 0x07 0x7C', '0x0D 0x06 0x00'] }
      functions_query:
        normal: { commands: ['0x10 0x07 0x7C', '0x15'] }  # read-back / status query
      g6000_reset_operand: '0x0D 0x00 0x00'      # the 'common' row — what a G6020 absorber clear writes
      # ── functor-3 keyword selector (cipher seed) ─────────────────────────────
      keyword:
        codes: '0x4D 0x49 0x53 0x00'             # "MIS\0"
        index: '0x03 0x01 0x00 0x02'
        resolution_value: '0x4D 0xB6 0xAB 0x00'  # from the <resolution> method; encoders XOR the live device keyword instead
      # ── functor-3 cipher tables (XOR keystream) ──────────────────────────────
      command_index:                             # 5 permutation arrays (×20 bytes)
        - '0x0F 0x03 0x13 0x0C 0x01 0x08 0x00 0x12 0x07 0x05 0x10 0x04 0x0E 0x06 0x02 0x11 0x0B 0x0D 0x09 0x0A'
        - '0x08 0x12 0x00 0x06 0x0F 0x04 0x0B 0x0E 0x01 0x0A 0x02 0x13 0x03 0x05 0x11 0x07 0x0D 0x09 0x10 0x0C'
        - '0x04 0x0B 0x13 0x09 0x07 0x11 0x0F 0x02 0x0D 0x00 0x01 0x0E 0x05 0x03 0x06 0x10 0x08 0x0A 0x0C 0x12'
        - '0x12 0x0E 0x00 0x0F 0x07 0x08 0x0B 0x01 0x13 0x03 0x11 0x02 0x10 0x04 0x0D 0x09 0x0C 0x06 0x0A 0x05'
        - '0x07 0x05 0x08 0x0A 0x11 0x03 0x00 0x0E 0x13 0x12 0x04 0x01 0x09 0x06 0x02 0x0D 0x0F 0x0B 0x0C 0x10'
      command_codes:                             # 7 keystream arrays (×20 bytes)
        - '0x09 0x12 0xDD 0x1D 0x41 0x13 0x63 0x6B 0x44 0x2A 0x17 0xBD 0xAF 0xD2 0x88 0x31 0x3B 0x71 0xBB 0xE5'
        - '0xBB 0x41 0x2C 0xD2 0x18 0x89 0x77 0x45 0x4F 0x11 0x05 0x67 0x25 0xD3 0x7C 0x4E 0xD4 0x4A 0x88 0x91'
        - '0x3F 0x03 0x26 0x3D 0xCA 0x72 0x89 0x44 0x09 0xE2 0xB8 0x20 0xA9 0x4E 0x2B 0x04 0x0C 0x69 0x6B 0x25'
        - '0x68 0x12 0x63 0x7F 0x8F 0xDE 0x70 0x40 0x38 0x2F 0x09 0x64 0x81 0xBB 0x31 0xC5 0x1A 0x72 0x6D 0x3A'
        - '0xCA 0xCC 0x1D 0xE4 0x78 0x1C 0x1B 0x7E 0x7F 0x14 0xD5 0x18 0xD1 0xCF 0x80 0x7B 0x02 0xD3 0x19 0xDE'
        - '0x14 0x27 0x22 0x08 0x0A 0x9D 0xA7 0xCA 0xE8 0x3A 0x4B 0x47 0x6B 0x89 0x95 0x90 0x23 0x6F 0xB2 0xC7'
        - '0x38 0x42 0x2F 0x4F 0x6D 0x70 0x9B 0xDD 0xE6 0x09 0x05 0x07 0xF0 0x12 0xA8 0x17 0x62 0x4C 0x31 0x95'
      # 3 <array>s, each holding an ORDERED list of <value> sub-programs. Each
      # <value> is its own multi-action operator-VM program (a list of
      # {sign,data} <action> steps); the operator-VM evaluates each <value> from
      # the message seed (acc reset per <value>) and emits ONE shift-table entry
      # per <value> — FUN_004e76c0:340-495 (outer loop = local_128 <value>s,
      # inner loop = local_114 <action>s, acc=local_d4 reset at :342, append at
      # :492). Document order is load-bearing and pinned as list-of-list-of-list.
      # sign ∈ = + - * / % & | ^. (method-3 data: every <value> is single-action,
      # but the nesting is stored explicitly so both cipher mirrors agree even
      # for multi-action <value>s, and order is interpreter-independent.)
      command_shift:
        - [[{ sign: '=', data: 0 }], [{ sign: '&', data: 1 }], [{ sign: '=', data: 0 }], [{ sign: '=', data: 0 }]]
        - [[{ sign: '&', data: 1 }], [{ sign: '=', data: 1 }], [{ sign: '%', data: 5 }], [{ sign: '=', data: 0 }]]
        - [[{ sign: '&', data: 1 }], [{ sign: '=', data: 0 }], [{ sign: '=', data: 0 }], [{ sign: '=', data: 2 }]]
      # ── functor-3 functions code→special→indexes (absorber/waste op remap) ───
      # FULL 67-row table (code 0x00–0x43, sparse: 0x1F and 0x31 absent in the
      # source), re-synced VERBATIM from the devices.xml-parsed SR5 method
      # (scripts/canon_sr5_cipher.parse_devices_xml -> encoder_for_method(3))
      # on 2026-06-01. The earlier truncated 13-row subset dropped code 0x10
      # (the SELECTOR's frame[3]), whose <special>/<indexes> overwrite the
      # envelope at offsets 5/9/13 — the 17/20 SSOT drift. Each function block is
      # keyed by <code> (= the command id frame[3]); <special> is flat
      # (offset, value) pairs written as env[4+offset]:=value, <indexes> scatters
      # the frame[4:] payload into env[4+indexes[i]].
      functor3_functions:
        0x00: { special: '0x04 0x66', indexes: [] }
        0x01: { special: '0x05 0x22', indexes: ['0x07'] }
        0x02: { special: '0x00 0x87', indexes: [] }
        0x03: { special: '0x0F 0x01', indexes: ['0x03'] }
        0x04: { special: '0x09 0xA3', indexes: ['0x08'] }
        0x05: { special: '0x07 0x66', indexes: [] }
        0x06: { special: '0x01 0x81', indexes: [] }
        0x07: { special: '0x04 0x0F', indexes: ['0x01', '0x03'] }
        0x08: { special: '0x0B 0x91', indexes: ['0x06', '0x01'] }
        0x09: { special: '0x02 0x22', indexes: ['0x07', '0x0A'] }
        0x0A: { special: '0x06 0x02', indexes: [] }
        0x0B: { special: '0x06 0xCC', indexes: ['0x02', '0x0D'] }
        0x0C: { special: '0x02 0xA8', indexes: [] }
        0x0D: { special: '0x05 0x01', indexes: ['0x03', '0x04'] }
        0x0E: { special: '0x0A 0x10', indexes: ['0x0B'] }
        0x0F: { special: '0x02 0x02', indexes: ['0x01'] }
        0x10: { special: '0x01 0xDD', indexes: ['0x09', '0x05'] }
        0x11: { special: '0x00 0xB4', indexes: ['0x0C'] }
        0x12: { special: '0x03 0x3A', indexes: ['0x02', '0x0A'] }
        0x13: { special: '0x01 0xAA', indexes: ['0x05'] }
        0x14: { special: '0x07 0x03', indexes: ['0x06'] }
        0x15: { special: '0x03 0x6D', indexes: [] }
        0x16: { special: '0x08 0x91', indexes: [] }
        0x17: { special: '0x04 0x49', indexes: [] }
        0x18: { special: '0x0C 0x12', indexes: ['0x0D'] }
        0x19: { special: '0x0C 0x61', indexes: [] }
        0x1A: { special: '0x02 0x09', indexes: ['0x01'] }
        0x1B: { special: '0x01 0xDD', indexes: [] }
        0x1C: { special: '0x03 0x93', indexes: [] }
        0x1D: { special: '0x0A 0x04', indexes: [] }
        0x1E: { special: '0x07 0x71', indexes: [] }
        0x20: { special: '0x06 0xC2', indexes: [] }
        0x21: { special: '0x02 0x12', indexes: ['0x08'] }
        0x22: { special: '0x08 0x88', indexes: [] }
        0x23: { special: '0x0E 0xEE', indexes: [] }
        0x24: { special: '0x09 0x99', indexes: [] }
        0x25: { special: '0x0D 0x02', indexes: [] }
        0x26: { special: '0x01 0x19', indexes: [] }
        0x27: { special: '0x05 0x59', indexes: ['0x08'] }
        0x28: { special: '0x0B 0x22', indexes: ['0x01'] }
        0x29: { special: '0x02 0x89', indexes: [] }
        0x2A: { special: '0x0A 0xCA', indexes: [] }
        0x2B: { special: '0x07 0x35', indexes: [] }
        0x2C: { special: '0x08 0x40', indexes: [] }
        0x2D: { special: '0x06 0x34', indexes: [] }
        0x2E: { special: '0x07 0x82', indexes: ['0x08', '0x09'] }
        0x2F: { special: '0x05 0x17', indexes: ['0x03', '0x0A'] }
        0x30: { special: '0x03 0x56', indexes: ['0x01'] }
        0x31: { special: '0x04 0x62', indexes: [] }
        0x32: { special: '0x02 0x38', indexes: [] }
        0x33: { special: '0x04 0x57', indexes: ['0x08'] }
        0x34: { special: '0x0E 0x13', indexes: [] }
        0x35: { special: '0x0D 0x78', indexes: ['0x0A'] }
        0x36: { special: '0x04 0x24', indexes: ['0x03'] }
        0x37: { special: '0x0B 0x60', indexes: [] }
        0x38: { special: '0x09 0x26', indexes: [] }
        0x39: { special: '0x0A 0xB5', indexes: [] }
        0x3A: { special: '0x08 0x05', indexes: [] }
        0x3B: { special: '0x0C 0x50', indexes: [] }
        0x3C: { special: '0x07 0x77', indexes: [] }
        0x3D: { special: '0x0F 0x29', indexes: [] }
        0x3E: { special: '0x02 0xE7', indexes: [] }
        0x3F: { special: '0x05 0x9D', indexes: [] }
        0x40: { special: '0x0B 0x83', indexes: [] }
        0x41: { special: '0x06 0xEB', indexes: [] }
        0x42: { special: '0x04 0x70', indexes: ['0x08'] }
        0x43: { special: '0x0D 0x2C', indexes: ['0x0A'] }
      # ── functor-3 envelope (deterministic; from the static lane) ─────────────
      functor3_envelope:
        prefix: '0x00 0x12 0x01'                 # then frame[3], then the 16 fixed LCG bytes
        lcg_seed: 0x12345678                      # MSVC rand(): s = s*0x343fd + 0x269ec3
        lcg16: '0xE9 0x3F 0x0D 0xA1 0x96 0x95 0x31 0x04 0x49 0x2D 0x9E 0x61 0x83 0xCF 0x09 0x6F'  # CONSTANT
      # ── statuses (RECV status-row decode) ────────────────────────────────────
      statuses:
        0x00: success
        0x01: failure-not-ready
        0xFF: failure-unsupported
      # ── The one residual input ───────────────────────────────────────────────
      residual: |
        The live 4-byte device keyword (commands.get_keyword RECV). functor_initialization
        XORs it into the encoder for set_command: out[i] = keyword_codes[keyword_index[i]] ^ device_keyword[i].
        No longer a static wall: set_session + get_keyword are now encipherable from the
        recovered tables above, so the keyword is readable natively. After that read,
        the set_command(common = 0D 00 00) frame is fully determined.

      # ── DERIVED enciphered on-wire sequence (the finished derivation) ─────────
      # The full ordered, functor-3-enciphered byte sequence for the G6020
      # waste:common (5B00) clear, computed by scripts/canon_sr5_cipher.py from
      # the tables above. This is the join of Lane A (cipher) + Lane B (ordered
      # transport) + Lane C (cross-val). It is DERIVED and NOT-YET-LIVE-VALIDATED:
      # it does NOT promote absorber_reset.status (still 'derived-unvalidated') and
      # ops.reset_absorber_wicreset still refuses --execute until either a real
      # validation run promotes the status, or the operator passes accept_derived
      # for the one-run live validation on the dedicated debug unit. See
      # docs/runbook/g6020-live-validation.md.
      derived_sequence:
        validation: hardware-validated                # native libusb 5B00 clear, 2026-06-01
        encoder_ref: scripts/canon_sr5_cipher.py    # the tested reference encoder
        keyword_form: template-default               # 4D B6 AB 00 -> bound 00 FF 00 F8
        wire_frame: '85 00 00 || payload(20)'        # 23-byte set_command frame (buffer-role swap)
        confidence: |
          VALIDATED for set_command[10 07 7C] / set_command[0D 00 00]: with the
          real captured live keyword (e4 7c 5a 00 -> bound 00 35 a9 09) the encoder
          reproduces WICReset's actual SELECTOR/CLEAR frames byte-exact (23/23) —
          see hardware_validated_frames below. The genuine set_command is functor-2
          with the buffer roles SWAPPED: SUBJECT = the 20-byte functor-3 envelope,
          SEED = the 4-byte bound keyword → a 20-byte payload, framed 85 00 00 ||
          payload. set_session is enciphered the same way; get_keyword/get_command
          are bare 3-byte READ headers (control-IN; the RECV reply is what matters,
          so they go on the wire verbatim). On a LIVE run the keyword read at step 2
          reseeds the functor-2 SEED so the whole 20-byte payload changes (binding).
        # Each set_command frame: plaintext app frame (85 00 00 || operand) ->
        # on-wire bytes = the 3-byte header (85 00 00) || the 20-byte enciphered
        # functor-3 payload. The functor-3 envelope is the functor-2 SUBJECT and
        # the 4-byte bound keyword is the SEED; the operand rides the envelope via
        # frame[3] (function-block selector) + the <indexes> scatter, so the whole
        # payload is command-dependent (SELECTOR != CLEAR). Bytes below are the
        # template-default-keyword (4D B6 AB 00 -> bound 00 FF 00 F8) form.
        frames:
          set_session:
            plaintext: '81 00 00 03'
            wire: '81 00 00 9a 4d c7 5b db 67 1a e9 1a 00 5e df 77 db 9b 8f 18 7c 71 b5'
          get_keyword:
            plaintext: '82 00 00'                   # bare read header -> on the wire verbatim
            wire: '82 00 00'
            recv: 'live 4-byte device keyword (the one residual input)'
          set_command_select:                       # waste-row selector 10 07 7C
            plaintext: '85 00 00 10 07 7c'
            wire: '85 00 00 9a 4d c7 5b db 67 1a e9 74 13 5e df 77 db b1 66 18 7c 71 57'
          set_command_reset:                        # 'common' operand 0D 00 00 == the 5B00 clear
            plaintext: '85 00 00 0d 00 00'
            wire: '85 00 00 9a 4d c7 5b 7a f1 1a e9 74 0e 5e df 77 db 9b 1b 18 7c 71 b5'
          get_command_verify:
            plaintext: '86 00 00'                   # bare read header -> on the wire verbatim
            wire: '86 00 00'
        # The REAL hardware-validated frames (the WICReset captured live keyword
        # e4 7c 5a 00 -> bound 00 35 a9 09). build_encoder + canon_sr5_cipher both
        # reproduce these byte-exact (23/23) — the ground-truth anchor.
        hardware_validated_frames:
          live_keyword: 'e4 7c 5a 00'               # padded from the 3B device read e4 7c 5a
          bound_keyword: '00 35 a9 09'
          set_command_select: '85 00 00 db bb 00 67 59 a1 b0 1f 84 2f d5 83 04 4a 3a c3 51 d2 b1 ef'
          set_command_reset: '85 00 00 4d bb 00 67 59 a1 b0 1f 84 2f d5 83 19 a8 3a 62 7b af b1 ef'
        live_keyword_substitution: |
          The 'frames' bytes are the template-default-keyword (4D B6 AB 00 -> bound
          00 FF 00 F8) form. On a LIVE run the get_keyword RECV at step 2 returns
          the printer's real 4-byte keyword; ops feeds it to encoder.seed_keyword,
          which reseeds the functor-2 SEED, so the whole 20-byte payload of
          set_command_select / set_command_reset changes (device binding). With the
          symbolic live keyword 11 22 33 44 (bound 44 6B 5C 60):
            set_command[10 07 7C] -> 85 00 00 70 7e aa 7a bf 89 7c be d1 94 7c 7c e1 f1 a8 08 f8 76 84 a1
            set_command[0D 00 00] -> 85 00 00 70 7e aa 7a 1e 1f 7c be d1 89 7c 7c e1 f1 82 75 f8 76 84 43
          The default-keyword wire bytes are therefore NOT what goes on the wire
          live — they are the key-free derivation; the live keyword is the only
          runtime input. See hardware_validated_frames for the real captured frame.


---
# canon_tool_dev — install the capture + RE environment on the dev host.
# Idempotent. Safe to re-run. Does not modify the canon-tool service itself.

# ─── Pre-flight: unblock dnf ─────────────────────────────────────────────────
# Tailscale's repo metadata is signed with a key that needs to be imported
# before dnf can refresh — otherwise it prompts interactively and silently
# blocks every package query. We import unconditionally; rpm is idempotent.

- name: 'pre-flight: import Tailscale repo GPG key (unblocks dnf)'
  ansible.builtin.rpm_key:
    state: present
    key: 'https://pkgs.tailscale.com/stable/rhel/10/repo.gpg'
  tags: [canon-tool-dev, dnf]

- name: 'pre-flight: remove broken /etc/yum.repos.d/winehq.repo if present'
  # An earlier (now-superseded) version of this role pointed at
  # https://dl.winehq.org/wine-builds/centos/9/ which 404s. If we left a
  # broken repo file behind, every subsequent dnf operation will fail. Wine
  # is now installed via Flatpak (see below).
  ansible.builtin.file:
    path: /etc/yum.repos.d/winehq.repo
    state: absent
  tags: [canon-tool-dev, dnf]

# ─── Groups + user membership ────────────────────────────────────────────────

- name: 'group: printstack (for udev USB access)'
  ansible.builtin.group:
    name: printstack
    state: present
    system: true
  tags: [canon-tool-dev, groups]

- name: 'user: add {{ canon_tool_dev_capture_user }} to printstack group (wireshark group added post-install)'
  ansible.builtin.user:
    name: '{{ canon_tool_dev_capture_user }}'
    groups: 'printstack'
    append: true
  tags: [canon-tool-dev, groups]

# ─── Core capture stack from Rocky 10 repos ──────────────────────────────────

- name: 'dnf: install USB capture + Python USB packages'
  ansible.builtin.dnf:
    name:
      - wireshark
      - wireshark-cli
      - libpcap
      - python3-pyusb
      - libusb1-devel
      - libusb-compat-0.1
      - p7zip
      - p7zip-plugins
    state: present
    disablerepo: tailscale-stable    # belt-and-braces; key was imported above
  tags: [canon-tool-dev, capture]

- name: 'dnf: install QEMU + libvirt (R2 path)'
  ansible.builtin.dnf:
    name:
      - qemu-kvm
      - qemu-img
      - libvirt-daemon-kvm
      - libvirt-client
      - virt-install
      - virt-manager
      - edk2-ovmf
    state: present
    disablerepo: tailscale-stable
  when: canon_tool_dev_install_qemu | bool
  tags: [canon-tool-dev, qemu]

- name: 'service: enable + start libvirtd'
  ansible.builtin.systemd:
    name: libvirtd
    enabled: true
    state: started
  when: canon_tool_dev_install_qemu | bool
  tags: [canon-tool-dev, qemu]

# ─── Wine via Flatpak ────────────────────────────────────────────────────────
# Winehq dropped CentOS/RHEL RPM support (only Fedora 40/41 published as of
# 2026-05). Fedora ABI is too different from Rocky 10 to safely cross-install.
# Flatpak is the official cross-distro Wine path. flatpak + flathub are
# already configured in Rocky 10 AppStream / by user; this role just adds
# the Wine app + overrides for USB + staging-dir access.

- name: 'dnf: ensure flatpak is installed'
  ansible.builtin.dnf:
    name: flatpak
    state: present
    disablerepo: tailscale-stable
  tags: [canon-tool-dev, wine]

- name: 'flatpak: ensure flathub remote is configured (system)'
  ansible.builtin.command: 'flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo'
  register: flathub_add
  changed_when: flathub_add.rc == 0 and 'already exists' not in flathub_add.stderr
  failed_when: flathub_add.rc != 0 and 'already exists' not in flathub_add.stderr
  tags: [canon-tool-dev, wine]

- name: 'flatpak: install Wine ({{ canon_tool_dev_wine_flatpak_ref }})'
  ansible.builtin.command: 'flatpak install -y --noninteractive flathub {{ canon_tool_dev_wine_flatpak_ref }}'
  register: wine_install
  changed_when: '"Installing" in wine_install.stdout or "Updating" in wine_install.stdout'
  tags: [canon-tool-dev, wine]

- name: 'flatpak: grant Wine USB device access (--device=all)'
  # /dev/bus/usb filesystem override is REJECTED by Flatpak ("/dev is reserved")
  # and is redundant — `--device=all` already grants USB access via the device
  # portal.
  ansible.builtin.command: 'flatpak override org.winehq.Wine --device=all'
  changed_when: true                      # idempotent on Flatpak side
  tags: [canon-tool-dev, wine]

- name: 'flatpak: undo any pre-existing /dev/bus/usb filesystem override (silence noise)'
  ansible.builtin.command: 'flatpak override org.winehq.Wine --nofilesystem=/dev/bus/usb'
  changed_when: true
  failed_when: false                      # OK if there was nothing to undo
  tags: [canon-tool-dev, wine]

- name: 'flatpak: grant Wine access to {{ canon_tool_dev_capture_user }} home staging dir'
  ansible.builtin.command: 'flatpak override org.winehq.Wine --filesystem=/home/{{ canon_tool_dev_capture_user }}/canon-tool-staging'
  changed_when: true
  tags: [canon-tool-dev, wine]

- name: 'wrapper: /usr/local/bin/wine invokes flatpak run'
  ansible.builtin.copy:
    dest: /usr/local/bin/wine
    content: |
      #!/bin/sh
      # Auto-generated by canon_tool_dev role.
      # Routes `wine <args>` to the Flatpak Wine app with full USB + staging access.
      exec flatpak run org.winehq.Wine "$@"
    mode: '0755'
    owner: root
    group: root
  tags: [canon-tool-dev, wine]

# ─── usbmon kernel module + udev rules ───────────────────────────────────────

- name: 'usbmon: autoload at boot'
  ansible.builtin.copy:
    src: usbmon.modules.conf
    dest: /etc/modules-load.d/usbmon.conf
    owner: root
    group: root
    mode: '0644'
  notify: load usbmon now
  tags: [canon-tool-dev, usb]

- name: 'udev: install Canon G-series rule'
  ansible.builtin.copy:
    src: 50-canon-g6020.rules
    dest: /etc/udev/rules.d/50-canon-g6020.rules
    owner: root
    group: root
    mode: '0644'
  notify: reload udev
  tags: [canon-tool-dev, usb]

# ─── Final group membership refresh (wireshark group now exists) ─────────────

- name: 'user: re-confirm {{ canon_tool_dev_capture_user }} in wireshark + usbmon groups'
  # usbmon membership lets tshark read /dev/usbmonN (root:usbmon 0640) without
  # sudo; combined with dumpcap's file-capabilities the capture is unprivileged.
  ansible.builtin.user:
    name: '{{ canon_tool_dev_capture_user }}'
    groups: 'printstack,wireshark,usbmon'
    append: true
  tags: [canon-tool-dev, groups]

# ─── Scoped passwordless sudo (lab convention) ───────────────────────────────
# Only the ipp-usb service toggle — see templates/canon-capture-sudoers.j2.

- name: 'sudoers: scoped NOPASSWD drop-in for the capture harness'
  ansible.builtin.template:
    src: canon-capture-sudoers.j2
    dest: '/etc/sudoers.d/{{ canon_tool_dev_sudoers_file }}'
    mode: '0440'
    owner: root
    group: root
    validate: 'visudo -cf %s'
  tags: [canon-tool-dev, sudo]

- name: 'note: log out + back in for new group membership to take effect'
  ansible.builtin.debug:
    msg: |
      Role complete. NOTE: {{ canon_tool_dev_capture_user }} must log out and
      log back in (or run `newgrp wireshark; newgrp printstack`) for the new
      group membership to be effective in interactive shells. systemd units
      pick it up at next start.
  tags: [canon-tool-dev]

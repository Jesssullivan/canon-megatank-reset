---
# Defaults for canon_tool_dev. Override in inventory/group_vars or via
# `ansible-playbook -e ...`.

# Which Winehq variant to install. "stable" is the LTS-style branch;
# "staging" has more Win-app compat but more churn. "devel" is bleeding edge.
canon_tool_dev_wine_branch: stable

# Winehq's per-distro repo file lives under .../wine-builds/<distro>/<version>/.
# Rocky 10 / RHEL 10's official Winehq repo isn't published yet (as of 2026-05).
# CentOS 9 (RHEL-9 ABI) is the closest practical fit and works on Rocky 10.
# Override to "10" once Winehq ships RHEL10 builds.
canon_tool_dev_wine_repo_distro: centos
canon_tool_dev_wine_repo_distro_version: '9'

# Whether to also install qemu-kvm + libvirt + virt-manager (the R2 path).
# Set false if you only want the R1 (Wine+usbmon) path on this host.
canon_tool_dev_install_qemu: true

# The user that runs the capture session — added to wireshark + printstack groups.
canon_tool_dev_capture_user: jess

# USB vendor IDs to grant non-root access to via udev. Default covers Canon
# (04a9). Extend if testing other vendor maintenance tools.
canon_tool_dev_udev_vendor_ids:
  - '04a9'    # Canon

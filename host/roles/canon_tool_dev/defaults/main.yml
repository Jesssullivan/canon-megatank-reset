---
# Defaults for canon_tool_dev. Override in inventory/group_vars or via
# `ansible-playbook -e ...`.

# Wine on Rocky 10 comes from Flathub (Winehq dropped CentOS/RHEL RPM
# support; only Fedora 40/41 published as of 2026-05). The Flathub
# `org.winehq.Wine` app has multiple branches; we pin to a specific one
# for reproducibility. stable-25.08 is the latest stable as of 2026-05;
# it supports both 32-bit (Win32 MFC apps like Canon Service Tool) and
# 64-bit Windows apps directly.
canon_tool_dev_wine_flatpak_ref: 'app/org.winehq.Wine/x86_64/stable-25.08'

# Whether to also install qemu-kvm + libvirt + virt-manager (the R2 path).
# Set false if you only want the R1 (Wine+usbmon) path on this host.
canon_tool_dev_install_qemu: true

# The user that runs the capture session — added to wireshark + printstack groups.
canon_tool_dev_capture_user: jess

# USB vendor IDs to grant non-root access to via udev. Default covers Canon
# (04a9). Extend if testing other vendor maintenance tools.
canon_tool_dev_udev_vendor_ids:
  - '04a9'    # Canon

all:
  hosts:
    mbp-13:
      # Capture/RE host (the G6020 is USB-attached here). Set this to your own
      # host's address — a Tailscale MagicDNS name, LAN IP, or /etc/hosts entry.
      ansible_host: mbp-13
      ansible_user: jess
      ansible_become: true
      # sudo requires password; become pw comes from $BECOME_PASSWORD_FILE (sops) or --ask-become-pass.
      ansible_become_method: sudo
      ansible_python_interpreter: /usr/bin/python3
  children:
    capture_hosts:
      hosts:
        mbp-13:
    # Hosts that get the native reset tool + the gated, manual-trigger systemd
    # unit (canon_tool_reset role). mbp-13 is the lead/validated unit; add fleet
    # printers here as they come online. Deploy is install+scaffold only — it
    # never triggers a reset (the commit is a manual power-button press).
    reset_fleet:
      hosts:
        mbp-13:
  vars:
    # Rocky Linux 10, Budgie/Wayland session, nix profile at ~/.nix-profile/bin,
    # login shell fish (use `bash -lc` for ssh probes).
    canon_tool_dev_capture_user: jess
